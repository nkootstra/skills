skill: adversarial-review

tests:
  # --- Core: pipeline structure & agents ---

  - name: Describes the three-agent pipeline
    prompt: |
      How does your adversarial review process work? Give me an overview.
    expected: Should describe the three-agent pipeline — Bug Finder (over-reports to maximize findings), Adversary (challenges and disproves findings), and Referee (delivers final verdicts). Should explain that opposing incentives converge on truth.
    required_keywords:
      - "bug finder"
      - "adversary"
      - "referee"
    forbidden_keywords:
      - "single pass"
      - "one reviewer"

  - name: Explains why single-agent review is insufficient
    prompt: |
      Why can't I just ask one agent to find all the bugs in my code?
      Isn't that enough?
    expected: Should explain that a single agent will over-report — inventing bugs to please the user. The adversarial pipeline uses competing incentives to filter false positives and converge on real bugs.
    required_keywords:
      - "false positive"
    forbidden_keywords:
      - "single pass is fine"
      - "one agent is enough"

  - name: Explains the sycophancy exploit
    prompt: |
      What's the core insight behind this adversarial approach?
    expected: Should explain that the pipeline turns sycophancy into a feature — each agent's desire to please is channeled into opposing roles, so their biases cancel out and the truth emerges.
    required_keywords:
      - "sycophancy"
    forbidden_keywords:
      - "agents are objective"

  # --- Core: environment detection ---

  - name: Distinguishes CLI and Claude.ai modes
    prompt: |
      I want to set up adversarial review. What do I need to know about
      the different environments it supports?
    expected: Should describe two modes — CLI mode (Claude Code / Codex) with real parallel subagents, and Claude.ai mode with sequential simulation. Should explain the trade-offs between them.
    required_keywords:
      - "CLI"
      - "sequential"
    forbidden_keywords:
      - "only works in CLI"

  - name: Recommends CLI mode for parallel agents
    prompt: |
      I'm using Claude Code on my terminal. How should I set up the
      adversarial review pipeline?
    expected: Should recommend CLI mode with real subagents spawned via claude -p or equivalent. Should describe the directory structure with prompt files and orchestration script. Each agent gets a clean context.
    required_keywords:
      - "prompt"
      - "bug-finder"
      - "adversary"
      - "referee"

  - name: Falls back to sequential simulation in Claude.ai
    prompt: |
      I'm chatting with you in Claude.ai. Can I still use adversarial review?
    expected: Should confirm it works via sequential simulation — adopting each role in turn with clear section headers (Bug Finder Report, Adversary Challenge, Referee Verdict). Should note it's less rigorous since the same agent plays all roles.
    required_keywords:
      - "sequential"
      - "simulation"

  # --- Core: agent roles and incentives ---

  - name: Bug Finder uses scoring incentive to over-report
    prompt: |
      What exactly does the Bug Finder agent do? How is it prompted?
    expected: Should describe the Bug Finder as an enthusiastic hunter incentivized to find every possible issue. Uses a scoring system (+1 low, +5 medium, +10 critical) to maximize findings. Reports with IDs (BUG-001, etc.), severity, location, description, and suggested fix.
    required_keywords:
      - "BUG-"
      - "scoring"
      - "severity"

  - name: Adversary uses penalty system to challenge findings
    prompt: |
      How does the Adversary agent work? What prevents it from dismissing
      everything?
    expected: Should describe the Adversary as a defense attorney for the codebase. Uses asymmetric penalties — gains points for correctly disproving bugs but loses 2x for incorrectly dismissing real bugs. This makes it aggressive but cautious.
    required_keywords:
      - "CONFIRMED"
      - "DISPUTED"
    forbidden_keywords:
      - "dismisses everything"

  - name: Referee uses ground truth framing
    prompt: |
      What does the Referee agent do and why does the prompt say it has
      "access to the ground truth"?
    expected: Should explain the Referee is an impartial judge that resolves disagreements. The "ground truth" framing is deliberate — it makes the referee more careful and deliberate rather than deferring to one side. It doesn't actually have ground truth.
    required_keywords:
      - "ground truth"
      - "confidence"

  # --- Core: output format ---

  - name: Produces structured report with confirmed and dismissed sections
    prompt: |
      What does the final output look like after running the full pipeline?
    expected: Should describe the structured report format with Summary (findings examined, confirmed bugs, false positives eliminated), Confirmed Bugs section with BUG IDs and severity, Dismissed Findings section with adversary rebuttal and referee verdict, and Referee Notes.
    required_keywords:
      - "confirmed"
      - "false positive"
      - "summary"

  # --- Core: when to use and when not ---

  - name: Recommends against using for simple reviews
    prompt: |
      I just want a quick review of a small utility function. Should I
      use the adversarial pipeline?
    expected: Should advise against it — the pipeline is overkill for simple tasks. Recommend it for critical code (auth, payments, data integrity), production deployments, security audits, or when single-pass reviews have missed bugs before.
    required_keywords:
      - "overkill"
    forbidden_keywords:
      - "always use adversarial"

  - name: Recommends pipeline for critical code
    prompt: |
      I'm about to deploy our authentication and payment processing code
      to production. I want to make sure we haven't missed any bugs.
      What do you suggest?
    expected: Should recommend the adversarial pipeline since auth and payments are critical code. Should describe the three-agent approach and how it reduces false positives for high-confidence review.
    required_keywords:
      - "bug finder"
      - "adversary"
      - "referee"

  # --- Core: customization ---

  - name: Supports scoped review focus
    prompt: |
      I only care about security vulnerabilities, not code style. Can the
      pipeline be customized?
    expected: Should confirm the pipeline is flexible and can focus on specific areas — security only, logic bugs only, performance, or all categories. Can also adjust severity threshold to skip low-impact findings.
    required_keywords:
      - "security"
      - "focus"
