skill: agents-md

tests:
  # --- Core SKILL.md: principles & workflow ---

  - name: Runs interactive intake before writing
    prompt: |
      I just cloned a new Rails monorepo and want you to create an AGENTS.md
      for it. Go ahead and write one.
    expected: Should NOT immediately write an AGENTS.md. Should run the interactive intake questionnaire first (Phase 1 preferences), asking about source, audience, format, depth, and optimization preferences before investigating the repo.
    required_keywords:
      - "question"
    forbidden_keywords:
      - "here is your AGENTS.md"
      - "here's your AGENTS.md"

  - name: Enforces minimum viable requirements principle
    prompt: |
      My AGENTS.md is 500 lines long. It covers every convention, has a full
      directory tree, architecture overview, and examples for each pattern.
      Is this a good AGENTS.md?
    expected: Should explain that 500 lines is too long — every line loads every session, so brevity has direct cost benefits. Should recommend targeting under 200 lines for root and relocating scoped content to sub-files.
    required_keywords:
      - "200"

  - name: Identifies style-guide anti-pattern
    prompt: |
      My AGENTS.md includes these rules:
      - Use 2 spaces for indentation
      - Always use trailing commas
      - Prefer single quotes over double quotes
      - Max line length 100 characters
      Should I keep these?
    expected: Should identify these as style/formatting rules that belong in a linter configuration (ESLint, Prettier, etc.), not in AGENTS.md. This is the "style guide" anti-pattern.
    required_keywords:
      - "linter"

  - name: Recommends hierarchical system for monorepo
    prompt: |
      We have a monorepo with 3 apps (web, mobile-api, admin), 12 shared
      packages, and 4 different teams. Should we use a single AGENTS.md?
    expected: Should recommend a hierarchical system with scoped sub-files rather than a single root file. Should mention that the harness auto-loads context files as the agent navigates, and that sub-files can be richer since they only load for that area.
    required_keywords:
      - "hierarchical"

  - name: Relocates before removing during audit
    prompt: |
      I'm auditing our AGENTS.md and found 15 instructions that are correct
      but only relevant to our API server code in src/api/. What should I do
      with them?
    expected: Should recommend relocating these to a scoped sub-file (e.g., src/api/AGENTS.md) rather than simply removing them. Must create the destination with full original content first, then replace in root with a pointer.
    required_keywords:
      - "relocate"
    forbidden_keywords:
      - "just remove"
      - "just delete"

  - name: Flags auto-generated init output
    prompt: |
      I ran `claude init` and it generated a CLAUDE.md with a full directory
      tree, all my npm scripts listed, and a summary of every source file.
      Should I commit this as-is?
    expected: Should warn against committing auto-generated /init output unedited. It's typically stuffed with docs the agent can already read. Should recommend rewriting it before committing.
    required_keywords:
      - "rewrite"
    forbidden_keywords:
      - "looks good"
      - "yes, commit it"
      - "go ahead and commit"
      - "safe to commit"

  # --- References: anti-patterns ---

  - name: Flags command dump anti-pattern
    prompt: |
      My AGENTS.md has this section:
      ## Commands
      - `npm run dev` — starts development server
      - `npm run build` — builds for production
      - `npm run start` — starts production server
      - `npm run lint` — runs ESLint
      Is this useful?
    expected: Should identify this as the "command dump" anti-pattern — listing inferrable commands that the agent can discover from package.json. Should recommend removing standard commands and only keeping non-obvious ones.
    required_keywords:
      - "inferr"

  # --- References: hierarchical ---

  - name: Applies Least Common Ancestor rule
    prompt: |
      We have the same testing convention documented in both
      packages/auth/AGENTS.md and packages/billing/AGENTS.md. They say
      the same thing. Is this fine since each team owns their package?
    expected: Should identify this as the "duplicated siblings" anti-pattern and recommend hoisting the shared fact to the Least Common Ancestor — the shallowest file that covers both paths (likely root or packages/AGENTS.md).
    required_keywords:
      - "ancestor"

  # --- References: TDD ---

  - name: Recommends behavior-based tests over implementation tests
    prompt: |
      My AGENTS.md has this testing rule: "Always mock internal services
      and verify they were called with the correct arguments." Is this
      good guidance for the agent?
    expected: Should push back — mocking internal collaborators leads to implementation-coupled tests. Should recommend testing through public interfaces and mocking only at system boundaries (external APIs, databases, time, etc.).
    required_keywords:
      - "boundar"
    forbidden_keywords:
      - "this is good advice"
