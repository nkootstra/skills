name: Skill Eval (Manual)

on:
  workflow_dispatch:
    inputs:
      skill:
        description: "Skill to evaluate (leave empty for all skills)"
        required: false
        type: string
        default: ""
      model:
        description: "Model to use for evaluation"
        required: false
        type: string
        default: "claude-haiku-4-5-20251001"
      strict:
        description: "Fail on any test failure"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  checks: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: nkootstra/skill-lint@main
        with:
          provider: anthropic
          model: ${{ inputs.model }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: eval
          skill: ${{ inputs.skill }}
          strict: ${{ inputs.strict }}
