name: Skill Lint

on:
  pull_request:
    paths:
      - "skills/**"
      - ".skill-lint.yml"

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nkootstra/skill-lint@main
        with:
          provider: litellm
          model: "openai/gpt-oss-120b:free"
          litellm_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          litellm_api_base: "https://openrouter.ai/api/v1"
